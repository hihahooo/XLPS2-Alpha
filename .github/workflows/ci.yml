name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cross-module-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pytest
      - name: Cross-module contract gate (48/48)
        run: pytest tests/test_cross_module.py -v

  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder firmware build
        run: echo "TODO: CFW build (STM32H7 toolchain) — wire after scaffold lands"

  hmi-build:
