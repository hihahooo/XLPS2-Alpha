## XLPS2-Alpha EMQX 片段（示例，真实值由基础设施下发）
## 见 broker/README.md

listeners.ssl.default.bind = 8883
listeners.ssl.default.certfile = /etc/emqx/certs/server.pem
listeners.ssl.default.keyfile  = /etc/emqx/certs/server.key
listeners.ssl.default.cacertfile = /etc/emqx/certs/ca.pem

## 允许 MQTT 5.0 / 3.1.1
mqtt.allow_anonymous = false

## 会话
zone.external.server_keepalive = 30

## 主题 ACL 见 README；此处仅示意 allow/deny 风格
## {device} = rgv/+/ota/cmd, rgv/+/ota/data, rgv/cloud/status
## {cloud}  = rgv/+/ota/progress, rgv/+/ota/result, rgv/+/telemetry
